name: Morning Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "5 10 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run morning pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python scripts/generate_daily.py

      - name: Commit all data changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "daily-informant-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/daily.json data/archive.json data/topics.json
          git commit -m "Update daily edition — $(date -u +%Y-%m-%d)"

      - name: Push changes
        run: |
          git remote set-url origin "https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git"
          git push origin main

      - name: Trigger Vercel deploy
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" || echo "Deploy hook failed (non-fatal)"
